[mypy]
python_version = 3.13
plugins = mypy_django_plugin.main
ignore_missing_imports = True
warn_unused_ignores = True
warn_redundant_casts = True
warn_return_any = True
no_implicit_optional = True
pretty = True
check_untyped_defs = True

# If you want mypy to check bodies of untyped functions too:
# check_untyped_defs = True

[mypy.plugins.django-stubs]
django_settings_module = config.settings

# Django migrations are almost always not worth typing strictly
[mypy.core.migrations.*]
ignore_errors = True

# Strawberry + Django return types often confuse mypy (models vs GraphQL types)
# If you decide to keep graphql strictly typed, remove this and return model types
# from resolvers/mutations (or add casts).
[mypy.core.graphql]
ignore_errors = True

# Optional: if you have a top-level app.py / scripts that are rougher
# [mypy.app]
# ignore_errors = True
